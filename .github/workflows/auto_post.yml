name: Auto Generate Jekyll Tech Post

on:
  schedule:
    - cron: '0 0 * * 1' # 매주 월요일 KST 09:00
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install azure-ai-inference

      - name: Run Auto Post Generator
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          python generate_post.py

      - name: Commit and Push generated post and images
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 포스팅 문서와 생성된 이미지 파일 모두 스테이징
          git add _posts/ assets/images/
          
          git diff --staged --quiet || (git commit -m "chore: auto post & image upload [skip ci]" && git push)
